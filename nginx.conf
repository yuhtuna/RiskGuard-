events {}

http {
    server {
        listen 8080;
        server_name localhost;

        # Serve the static frontend assets from the build directory
        location / {
            root /app/dist;
            try_files $uri $uri/ /index.html;
        }

        # All API requests and other fallbacks are proxied to the backend
        location @backend {
            proxy_pass http://localhost:8000; # The backend will run on port 8000
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Since ADK tools don't have a common prefix, we need to explicitly
        # define the locations to be proxied. A simple fallback with try_files
        # can cause issues with routing in the single-page application.
        location ~ ^/(start_full_scan|apply_fix_and_update_state|continue_scan_with_dast|download_fixed_code)$ {
            proxy_pass http://localhost:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
